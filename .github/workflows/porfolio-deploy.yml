# This is for portfolio website 
name: Porfolio
on:
  push:
    branches: [main]
  workflow_dispatch:  

permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.pages-url}}
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        
      - name: setup the Github Pages
        uses: actions/configure-pages@v4
        
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4




